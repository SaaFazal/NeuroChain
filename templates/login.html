<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetailFlow | Access Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #F9F8F3; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid white; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-[#E6DFD1]">
    <div class="w-full max-w-md glass-card rounded-[2.5rem] p-12 shadow-xl animate-fade-in">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold tracking-tighter">
                <span class="text-[#1F2933]">Retail</span><span class="text-[#D6A84F]">Flow</span>
            </h1>
            <p class="text-[#134235] text-[10px] font-bold uppercase tracking-[0.3em] mt-3">Inventory Intelligence</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-6 p-4 rounded-xl text-xs font-bold {% if category == 'danger' %}bg-red-50 text-red-600{% else %}bg-green-50 text-green-600{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="post" class="space-y-6">
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Manager ID</label>
                <input type="text" name="username" placeholder="Enter your ID" class="w-full bg-white border-gray-100 rounded-xl p-4 text-sm focus:ring-2 focus:ring-[#134235] transition-all" required>
            </div>
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Security Key</label>
                <input type="password" name="password" placeholder="••••••••" class="w-full bg-white border-gray-100 rounded-xl p-4 text-sm focus:ring-2 focus:ring-[#134235] transition-all" required>
            </div>
            <button type="submit" class="w-full bg-[#134235] text-white py-4 rounded-xl font-bold shadow-lg hover:brightness-110 active:scale-[0.98] transition-all">
                AUTHENTICATE
            </button>
        </form>

        <div class="mt-10 text-center text-xs">
            <span class="text-gray-400 font-medium">New store manager?</span>
            <a href="{{ url_for('register') }}" class="text-[#134235] font-bold ml-1 hover:underline">Initialize Account</a>
        </div>
    </div>
</body>
</html>
