<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetailFlow | Initialize Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #F9F8F3; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid white; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-[#E6DFD1]">
    <div class="w-full max-w-md glass-card rounded-[2.5rem] p-12 shadow-xl animate-fade-in">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold tracking-tighter">
                <span class="text-[#1F2933]">CePT</span><span class="text-[#D6A84F]">Flow</span>
            </h1>
            <p class="text-[#134235] text-[10px] font-bold uppercase tracking-[0.3em] mt-3">Join the Intelligence Network</p>
        </div>

        <form action="{{ url_for('register') }}" method="post" class="space-y-6">
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Manager Username</label>
                <input type="text" name="username" placeholder="Choose a manager ID" class="w-full bg-white border-gray-100 rounded-xl p-4 text-sm focus:ring-2 focus:ring-[#134235] transition-all" required>
            </div>
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Password</label>
                <input type="password" name="password" placeholder="••••••••" class="w-full bg-white border-gray-100 rounded-xl p-4 text-sm focus:ring-2 focus:ring-[#134235] transition-all" required>
            </div>
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Store Name</label>
                <input type="text" name="shop_name" placeholder="e.g. Ushop Nottingham" class="w-full bg-white border-gray-100 rounded-xl p-4 text-sm focus:ring-2 focus:ring-[#134235] transition-all" required>
            </div>
            <button type="submit" class="w-full bg-[#134235] text-white py-4 rounded-xl font-bold shadow-lg hover:brightness-110 active:scale-[0.98] transition-all">
                INITIALIZE ACCOUNT
            </button>
        </form>

        <div class="mt-10 text-center text-xs">
            <span class="text-gray-400 font-medium">Already registered?</span>
            <a href="{{ url_for('login') }}" class="text-[#134235] font-bold ml-1 hover:underline">Sign In</a>
        </div>
    </div>
</body>
</html>
