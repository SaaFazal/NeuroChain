<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetailFlow | Initialize Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #E6DFD1; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <!-- Background Video -->
    <video autoplay muted loop playsinline class="fixed inset-0 w-full h-full object-cover z-[-2] brightness-75">
        <source src="{{ url_for('static', filename='bg_video.mp4') }}" type="video/mp4">
    </video>
    <div class="fixed inset-0 bg-[#E6DFD1]/40 z-[-1]"></div>

    <div class="w-full max-w-md glass-card rounded-[2rem] p-10 shadow-2xl animate-fade-in">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold tracking-tighter">
                <span class="text-[#1F2933]">Initialize</span> <span class="text-[#D6A84F]">Account</span>
            </h1>
            <p class="text-gray-500 text-sm mt-2 font-medium">Join the RetailFlow Intelligence Network</p>
        </div>

        <form action="{{ url_for('register') }}" method="post" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Username</label>
                <input type="text" name="username" placeholder="Choose a manager ID" class="w-full bg-white/50 border-none rounded-xl p-4 text-sm focus:ring-2 focus:ring-[#134235] transition-all" required>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Password</label>
                <input type="password" name="password" placeholder="••••••••" class="w-full bg-white/50 border-none rounded-xl p-4 text-sm focus:ring-2 focus:ring-[#134235] transition-all" required>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Location Name</label>
                <input type="text" name="shop_name" placeholder="e.g. Ushop Nottingham" class="w-full bg-white/50 border-none rounded-xl p-4 text-sm focus:ring-2 focus:ring-[#134235] transition-all" required>
            </div>
            <button type="submit" class="w-full bg-[#134235] text-white py-4 rounded-xl font-bold shadow-lg hover:brightness-110 active:scale-[0.98] transition-all">
                CREATE NETWORK NODE
            </button>
        </form>

        <div class="mt-10 text-center text-sm">
            <span class="text-gray-500">Already registered?</span>
            <a href="{{ url_for('login') }}" class="text-[#134235] font-bold ml-1 hover:underline">Sign In</a>
        </div>
    </div>
</body>
</html>
